<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/app.css" rel="stylesheet" />
    <title>billetsys app shell</title>
    <script>
      // Apply cached branding CSS variables before first paint to prevent color flicker.
      (function () {
        try {
          function faviconType(href) {
            if (href && href.indexOf("data:") === 0) {
              return (href.match(/^data:([^;,]+)[;,]/) || [])[1] || "image/png";
            }
            if (href && href.endsWith(".svg")) return "image/svg+xml";
            if (href && href.endsWith(".png")) return "image/png";
            return "image/x-icon";
          }
          function applyFavicon(href) {
            var head = document.head;
            if (!head) return;
            Array.from(head.querySelectorAll('link[rel~="icon"]')).forEach(
              function (existing) {
                existing.remove();
              },
            );
            ["icon", "shortcut icon"].forEach(function (rel) {
              var link = document.createElement("link");
              link.rel = rel;
              link.href = href;
              link.type = faviconType(href);
              link.setAttribute("data-installation-favicon", "true");
              if (href === "/favicon.ico") {
                link.sizes = "16x16";
              }
              head.appendChild(link);
            });
          }
          var raw = localStorage.getItem("billetsys.installation-branding");
          if (!raw) {
            applyFavicon("/favicon.ico");
            return;
          }
          var b = JSON.parse(raw);
          if (!b || typeof b !== "object") {
            applyFavicon("/favicon.ico");
            return;
          }
          applyFavicon(b.installationLogoBase64 || "/favicon.ico");
          var s = document.documentElement.style;
          function hex(c) {
            return /^#[0-9a-fA-F]{6}$/.test(c || "");
          }
          function luma(c) {
            var r = parseInt(c.slice(1, 3), 16),
              g = parseInt(c.slice(3, 5), 16),
              bl = parseInt(c.slice(5, 7), 16);
            return (r * 299 + g * 587 + bl * 114) / 1000;
          }
          function contrast(c) {
            return luma(c) >= 186 ? "#111827" : "#ffffff";
          }
          function darken(c) {
            function ch(o) {
              return Math.max(
                0,
                Math.min(
                  255,
                  Math.round(parseInt(c.slice(o, o + 2), 16) * 0.84),
                ),
              )
                .toString(16)
                .padStart(2, "0");
            }
            return "#" + ch(1) + ch(3) + ch(5);
          }
          if (hex(b.installationHeaderFooterColor)) {
            var hf = b.installationHeaderFooterColor.toLowerCase();
            s.setProperty("--header-bg", hf);
            s.setProperty("--header-text", contrast(hf));
          }
          if (hex(b.installationHeadersColor)) {
            var hc = b.installationHeadersColor.toLowerCase();
            s.setProperty("--section-header-color", hc);
            s.setProperty("--section-header-hover", darken(hc));
            s.setProperty("--primary-dark", darken(hc));
          }
          if (hex(b.installationButtonsColor)) {
            var bc = b.installationButtonsColor.toLowerCase();
            s.setProperty("--button-bg", bc);
            s.setProperty("--button-text", contrast(bc));
            s.setProperty("--button-hover", darken(bc));
          }
        } catch (e) {
          var fallback = document.createElement("link");
          fallback.rel = "icon";
          fallback.href = "/favicon.ico";
          fallback.type = "image/x-icon";
          fallback.sizes = "16x16";
          fallback.setAttribute("data-installation-favicon", "true");
          document.head.appendChild(fallback);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
