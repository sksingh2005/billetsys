<html>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#f5f6f8;color:#1a1a1a;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #d9dde3;border-radius:8px;padding:32px;">
          <tr>
            <td style="padding-bottom:20px;border-bottom:2px solid #b00020;">
              <strong style="font-size:18px;color:#b00020;">Password Reset Request</strong>
            </td>
          </tr>
          <tr>
            <td style="padding-top:20px;">
              <p style="margin:0 0 16px;">You have requested a password reset.</p>
              <p style="margin:0 0 16px;">Your username is: <strong>{username}</strong></p>
              <p style="margin:0 0 20px;">Click the button below to reset your password:</p>
              <p style="margin:0 0 20px;">
                <a href="{resetLink}" style="display:inline-block;padding:10px 24px;background:#b00020;color:#fff;text-decoration:none;border-radius:4px;font-weight:600;">Reset Password</a>
              </p>
              <p style="margin:0 0 16px;font-size:13px;color:#58606b;">This link will expire in 30 minutes.</p>
              <p style="margin:0;font-size:13px;color:#58606b;">If you did not request this, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
