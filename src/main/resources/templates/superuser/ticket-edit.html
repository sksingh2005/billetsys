{#include support-layout}
{#content}
<div class="form-card">
    <h1>{ticket.name}</h1>
    <form method="post" action="/superuser/tickets/{ticket.id}">
        <label>Affects
            <select name="affectsVersionId" required>
                {#if versions.isEmpty}
                <option value="">-</option>
                {/if}
                {#for version in versions}
                <option value="{version.id}" {#if ticket.affectsVersion != null && ticket.affectsVersion.id == version.id}selected{/if}>{version.name} ({version.date})</option>
                {/for}
            </select>
        </label>
        <label>Resolved
            {#if allowResolvedEdit?? && allowResolvedEdit}
            <select name="resolvedVersionId">
                <option value="">-</option>
                {#for version in versions}
                <option value="{version.id}" {#if ticket.resolvedVersion != null && ticket.resolvedVersion.id == version.id}selected{/if}>{version.name} ({version.date})</option>
                {/for}
            </select>
            {#else}
            <input type="text" value="{#if ticket.resolvedVersion != null}{ticket.resolvedVersion.name} ({ticket.resolvedVersion.date}){#else}-{/if}" readonly>
            {/if}
        </label>
        <div class="form-actions">
            <a class="secondary-button" href="/superuser/tickets/{ticket.id}">Cancel</a>
            <button type="submit" class="action-button">Save</button>
        </div>
    </form>
</div>
{/content}
{/include}
